# Host nginx reverse proxy for LegisArc (DigitalOcean Droplet).
# Domain: legisarc.net
#
# Important: /api/auth/session must go to Next.js (HttpOnly cookie bridge).
# All other /api/* go to Express.

upstream legisarc_web {
  server 127.0.0.1:3000;
}

upstream legisarc_api {
  server 127.0.0.1:4000;
}

# HTTP — Certbot will expand this; keep for ACME + redirect
server {
  listen 80;
  server_name legisarc.net www.legisarc.net;

  client_max_body_size 30m;

  # Next.js session cookie bridge (must NOT go to Express)
  location /api/auth/session {
    proxy_pass http://legisarc_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://legisarc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://legisarc_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://legisarc_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
