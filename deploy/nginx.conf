# Example host nginx reverse proxy for LegisArc on a DigitalOcean Droplet.
# Place TLS certs via Certbot, then point server_name at your domain.

upstream legisarc_web {
  server 127.0.0.1:3000;
}

upstream legisarc_api {
  server 127.0.0.1:4000;
}

server {
  listen 80;
  server_name example.com www.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name example.com www.example.com;

  # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

  client_max_body_size 30m;

  # Express API
  location /api/ {
    proxy_pass http://legisarc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Local uploads only (STORAGE_DRIVER=local). Prefer Spaces CDN in production.
  location /uploads/ {
    proxy_pass http://legisarc_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js app (includes /api/auth/session cookie bridge)
  location / {
    proxy_pass http://legisarc_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
